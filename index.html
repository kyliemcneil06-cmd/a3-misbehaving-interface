<meta charset="UTF-8">
<style>
  body {
    overflow-x: hidden;
    margin: 0;
    font-family: sans-serif;
  }
  .gravity-btn {
    position: static;
    top: 20px;
    left: 20px;
    padding: 12px 24px;
    font-size: 18px;
    background: #1da135;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    z-index: 9999;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    transition: transform 0.1s;
  }
  .gravity-btn:active {
    transform: scale(0.95);
  }
</style>
</head>
<body>

<button class="gravity-btn" onclick="initGravity()">Reinstate Gravity</button>

<!-- Add your website content below -->
<div style="padding: 100px 20px; text-align: center;">
</div>

<script>
function initGravity() {
  const elements = document.body.getElementsByTagName('*');
  
  for (let i = 0; i < elements.length; i++) {
    const el = elements[i];
    if (el.tagName === 'SCRIPT' || el.tagName === 'STYLE' || el.contains(document.querySelector('.gravity-btn'))) {
      continue; 
    }

    const rect = el.getBoundingClientRect();
    el.style.position = 'fixed';
    el.style.left = rect.left + 'px';
    el.style.top = rect.top + 'px';
    el.style.width = rect.width + 'px';
    el.style.height = rect.height + 'px';
    el.style.margin = '0';
  }

  setTimeout(() => {
    for (let i = 0; i < elements.length; i++) {
      const el = elements[i];
      if (el.tagName === 'SCRIPT' || el.tagName === 'STYLE' || el.contains(document.querySelector('.gravity-btn'))) {
        continue; 
      }
      
      const randomTilt = Math.random() * 40 - 20;
      el.style.transition = 'all 1.5s cubic-bezier(0.55, 0.085, 0.68, 0.53)';
      el.style.top = (window.innerHeight - el.getBoundingClientRect().height) + 'px';
      el.style.transform = `rotate(${randomTilt}deg)`;
    }
  }, 50);
}
</script>
